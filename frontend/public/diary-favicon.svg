<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="diaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1C1828" />
            <stop offset="100%" stop-color="#2E2940" />
        </linearGradient>
        <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C9956A" />
            <stop offset="100%" stop-color="#7B3F20" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Transparent background for favicon -->
    <rect width="512" height="512" fill="transparent" />

    <!-- Main Book Shape -->
    <rect x="140" y="80" width="260" height="360" rx="32" fill="url(#diaryGrad)" stroke="url(#neonGlow)" stroke-width="16" />
    
    <!-- Spine Binding -->
    <rect x="110" y="80" width="40" height="360" rx="16" fill="url(#neonGlow)" />
    
    <!-- Digital Circuit Lines -->
    <path d="M 200 160 L 260 160 L 290 190 L 320 190" fill="none" stroke="url(#neonGlow)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="190" cy="160" r="16" fill="url(#neonGlow)" />
    <circle cx="330" cy="190" r="16" fill="url(#neonGlow)" />

    <!-- Lower Circuit Lines -->
    <path d="M 320 340 L 280 340 L 250 310 L 190 310" fill="none" stroke="url(#neonGlow)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="330" cy="340" r="16" fill="url(#neonGlow)" />
    <circle cx="190" cy="310" r="16" fill="url(#neonGlow)" />

    <!-- Center Glowing Lock / Digital Core -->
    <rect x="220" y="210" width="80" height="80" rx="24" fill="none" stroke="url(#neonGlow)" stroke-width="12" filter="url(#glow)"/>
    <circle cx="260" cy="250" r="20" fill="url(#neonGlow)" filter="url(#glow)"/>
</svg>
